{% extends 'base.html' %}

{% block title %}Ledger | AI Chat{% endblock %}
{% block page_title %}AI Chat{% endblock %}

{% block topbar_actions %}
<a class="btn" href="{% url 'dashboard' %}">Back to dashboard</a>
{% endblock %}

{% block content %}
<section class="chat-shell">
    <div class="chat-header">
        <div>
            <div class="panel-title">Ledger AI assistant</div>
            <div class="chat-subtitle">Ask about spending trends, budgets, and receipt insights.</div>
        </div>
        <span class="chat-status">Online</span>
    </div>

    <div id="chat-thread" class="chat-thread">

    </div>

    <div class="chat-composer">
        <label class="sr-only" for="chat-input">Ask Ledger AI</label>
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask Ledger AI anything about your finances...">
        <button id="btn_send_msg" class="btn btn-gold" type="submit">Send</button>
    </div>
</section>
    <script>

    document.getElementById("btn_send_msg").addEventListener("click", sendMessage);
    let eventSource;

function sendMessage() {
    const input = document.getElementById("chat-input");
    const chat = document.getElementById("chat-thread");

    const message = input.value;
    input.value = "";

    chat.innerHTML += ` <article class="chat-msg chat-msg-user"><div class="chat-bubble"> ${message}</div></article>`;
    const botMsg = document.createElement("article");
    botMsg.classList.add("chat-msg", "chat-msg-ai");

    const chatBubble = document.createElement("div");
    chatBubble.classList.add("chat-bubble");

    botMsg.appendChild(chatBubble);
    chat.appendChild(botMsg);

    // close old stream if exists
    if (eventSource) {
        eventSource.close();
    }

    eventSource = new EventSource(`/stream/?message=${encodeURIComponent(message)}`);

    let fullText = "";
    let typingQueue = [];
    let isTyping = false;

    // RECEIVE STREAM
    eventSource.onmessage = (event) => {
        if (event.data === "[DONE]") {
            eventSource.close();
            return;
        }

        typingQueue.push(event.data);
        processQueue();
    };

    // TYPING EFFECT ENGINE
    function processQueue() {
        if (isTyping || typingQueue.length === 0) return;

        isTyping = true;
        const chunk = typingQueue.shift();

        let i = 0;

        function typeChar() {
            if (i < chunk.length) {
                fullText += chunk[i];
                botMsg.innerHTML =  fullText;
                i++;

                // typing speed control
                setTimeout(typeChar, 15);
            } else {
                isTyping = false;
                processQueue();
            }
        }

        typeChar();
    }

    eventSource.onerror = () => {
        eventSource.close();
    };
}
    </script>
{% endblock %}
